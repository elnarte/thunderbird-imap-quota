<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IMAP Quota Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 24px;
      min-width: 320px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #cba6f7;
      margin-bottom: 20px;
      letter-spacing: 0.03em;
    }

    .section {
      background: #2a2a3e;
      border: 1px solid #383850;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #89b4fa;
      margin-bottom: 14px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .row:last-child { margin-bottom: 0; }

    .dot { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
    .row label { flex: 1; color: #bac2de; }

    .row input[type="number"] {
      width: 64px;
      padding: 4px 8px;
      background: #1e1e2e;
      border: 1px solid #45475a;
      border-radius: 5px;
      color: #cdd6f4;
      font-size: 13px;
      text-align: right;
    }
    .row input[type="number"]:focus {
      outline: none;
      border-color: #cba6f7;
    }

    .suffix { color: #6c7086; flex-shrink: 0; }

    .hint {
      font-size: 11px;
      color: #6c7086;
      margin-top: 10px;
      line-height: 1.5;
    }

    .preview-pill {
      display: inline-block;
      background: rgba(30,30,30,0.82);
      color: #eee;
      font: bold 11px/1.5 monospace;
      padding: 2px 8px;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      cursor: pointer;
    }

    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      align-items: center;
    }

    button {
      padding: 6px 16px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }

    #btn-save  { background: #cba6f7; color: #1e1e2e; }
    #btn-reset { background: #313244; color: #bac2de; border: 1px solid #45475a; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .toggle-row:last-child { margin-bottom: 0; }
    .toggle-row label { color: #bac2de; flex: 1; }

    .toggle {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
      flex-grow: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; margin: 0; }
    .toggle-slider {
      position: absolute;
      top: 0; right: 0;
      width: 36px;
      height: 20px;
      background: #45475a;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #cdd6f4;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: #cba6f7; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

    .saved-msg {
      font-size: 11px;
      color: #a6e3a1;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saved-msg.visible { opacity: 1; }
  </style>
</head>
<body>
  <h1>IMAP Quota Status — Settings</h1>

  <div class="section">
    <div class="section-title">Visibility</div>
    <div class="toggle-row">
      <label for="show-pill">Show status pill</label>
      <label class="toggle">
        <input type="checkbox" id="show-pill" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <label for="show-bars">Show folder pane bars</label>
      <label class="toggle">
        <input type="checkbox" id="show-bars" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Poll Interval</div>
    <div class="row">
      <label for="poll-interval">Check quota every</label>
      <input type="number" id="poll-interval" min="1" max="60" value="5">
      <span class="suffix">minutes</span>
    </div>
    <p class="hint">Changes take effect immediately after saving.</p>
  </div>

  <div class="section">
    <div class="section-title">Folder Pane Bar</div>
    <div class="row">
      <label for="bar-height">Bar height</label>
      <input type="number" id="bar-height" min="1" max="20" value="4">
      <span class="suffix">px</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Color Thresholds</div>
    <div class="row">
      <span class="dot">🔴</span>
      <label for="threshold-red">Show red when usage ≥</label>
      <input type="number" id="threshold-red" min="1" max="100" value="90">
      <span class="suffix">%</span>
    </div>
    <div class="row">
      <span class="dot">🟡</span>
      <label for="threshold-yellow">Show yellow when usage ≥</label>
      <input type="number" id="threshold-yellow" min="1" max="100" value="80">
      <span class="suffix">%</span>
    </div>
    <div class="row">
      <span class="dot">🔵</span>
      <label for="threshold-blue">Show blue when usage ≥</label>
      <input type="number" id="threshold-blue" min="1" max="100" value="70">
      <span class="suffix">%</span>
    </div>
    <div class="row">
      <span class="dot">🟢</span>
      <label>Show green below blue threshold</label>
    </div>
    <p class="hint">Red takes priority over yellow, yellow over blue, blue over green.</p>
  </div>

  <div class="section">
    <div class="section-title">Preview</div>
    <div class="row">
      <span class="preview-pill" id="preview-pill">🟢 My Account  42%  420 MB/1.0 GB</span>
    </div>
  </div>

  <div class="actions">
    <span class="saved-msg" id="saved-msg">Saved!</span>
    <button id="btn-reset">Reset to defaults</button>
    <button id="btn-save">Save</button>
  </div>

  <script src="options.js"></script>
</body>
</html>
